name: Publish plugin release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: immutable-plugin-releases
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate repository
        run: |
          python -m unittest discover -s tests
          python scripts/check_secrets.py
          python scripts/check_versions.py
      - name: Rebuild every deterministic bundle twice
        run: |
          python scripts/build_plugin.py --all --output-dir build/first
          python scripts/build_plugin.py --all --output-dir build/second
          diff --recursive --brief build/first build/second
      - name: Publish or verify immutable releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -r '.plugins | sort_by(.id)[] | [.id, .version, .name] | @tsv' catalog.json |
          while IFS=$'\t' read -r plugin version plugin_name; do
            tag="${plugin}-v${version}"
            archive="${plugin}_${version}.zip"
            checksum="${archive}.sha256"
            release_error="$(mktemp)"

            if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --silent 2>"$release_error"; then
              verify_dir="$(mktemp -d)"
              gh release download "$tag" \
                --pattern "$archive" \
                --pattern "$checksum" \
                --dir "$verify_dir"
              cmp "build/first/$archive" "$verify_dir/$archive"
              cmp "build/first/$checksum" "$verify_dir/$checksum"
              echo "Verified immutable release $tag"
              rm -rf "$verify_dir"
            elif grep -q "HTTP 404" "$release_error"; then
              if git show-ref --verify --quiet "refs/tags/$tag"; then
                mapfile -t shared_paths < <(
                  python -c \
                    'import sys; from scripts.build_plugin import shared_runtime_relative_paths; sys.stdout.write("\n".join(shared_runtime_relative_paths(sys.argv[1])))' \
                    "$plugin"
                )
                git diff --quiet "$tag" -- "plugins/$plugin" "${shared_paths[@]}" || {
                  echo "::error::Existing tag $tag does not match the packaged sources for $plugin on main."
                  exit 1
                }
                target_args=(--verify-tag)
              else
                target_args=(--target "$GITHUB_SHA")
              fi
              gh release create "$tag" \
                "build/first/$archive" \
                "build/first/$checksum" \
                "${target_args[@]}" \
                --title "${plugin_name} ${version}" \
                --notes "Deterministic standalone DiscVault plugin release."
              echo "Published immutable release $tag"
            else
              cat "$release_error" >&2
              exit 1
            fi
            rm -f "$release_error"
          done
