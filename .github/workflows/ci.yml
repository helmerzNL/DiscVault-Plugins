name: Plugin CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile plugin and tooling
        run: python -m compileall -q plugins scripts tests
      - name: Test
        run: python -m unittest discover -s tests
      - name: Secret guard
        run: python scripts/check_secrets.py
      - name: Version and catalog guard
        if: github.event_name == 'pull_request'
        run: python scripts/check_versions.py --base-ref "${{ github.event.pull_request.base.sha }}"
      - name: Version and catalog validation
        if: github.event_name != 'pull_request'
        run: python scripts/check_versions.py
      - name: Rebuild deterministic bundle twice
        run: |
          version="$(python -c "import json; print(json.load(open('plugins/movievault_v2/manifest.json'))['version'])")"
          python scripts/build_plugin.py --plugin movievault_v2 --output-dir build/first
          python scripts/build_plugin.py --plugin movievault_v2 --output-dir build/second
          cmp "build/first/movievault_v2_${version}.zip" "build/second/movievault_v2_${version}.zip"
          cmp "build/first/movievault_v2_${version}.zip.sha256" "build/second/movievault_v2_${version}.zip.sha256"
